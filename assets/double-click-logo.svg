<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Double Click Pizzeria logo</title>
  <desc id="desc">Vintage circular Double Click logo with pizza, brick wall, rolling pin, cursor and wood-fired pizzeria text.</desc>
  <defs>
    <radialGradient id="paper" cx="46%" cy="38%" r="62%">
      <stop offset="0" stop-color="#fff3cf"/>
      <stop offset=".62" stop-color="#e8d0a2"/>
      <stop offset="1" stop-color="#c79a5c"/>
    </radialGradient>
    <pattern id="brick" width="116" height="58" patternUnits="userSpaceOnUse">
      <rect width="116" height="58" fill="#d5bea1"/>
      <rect x="0" y="0" width="54" height="24" rx="3" fill="#a45d43" opacity=".72"/>
      <rect x="62" y="0" width="54" height="24" rx="3" fill="#8f4939" opacity=".66"/>
      <rect x="30" y="30" width="54" height="24" rx="3" fill="#b3694a" opacity=".7"/>
      <path d="M0 28h116M58 0v28M0 58h116" stroke="#f2dfbd" stroke-width="5" opacity=".75"/>
    </pattern>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .14"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <style>
      .navy{fill:#14384d}.ink{fill:#1f2322}.cream{fill:#fff1c8}.red{fill:#b84731}.green{fill:#587b38}.line{fill:none;stroke:#14384d;stroke-width:17;stroke-linecap:round;stroke-linejoin:round}.steam{fill:none;stroke:#846650;stroke-width:12;stroke-linecap:round}.darkline{fill:none;stroke:#1f2322;stroke-width:9;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <circle cx="450" cy="450" r="392" fill="url(#paper)"/>
  <circle cx="450" cy="450" r="378" fill="none" stroke="#b6864e" stroke-width="10" opacity=".7"/>
  <circle cx="450" cy="450" r="320" fill="url(#brick)" opacity=".92"/>
  <path d="M157 414a300 300 0 0 1 586 0" fill="none" stroke="#14384d" stroke-width="18"/>
  <path d="M175 546a287 287 0 0 0 550 0" fill="none" stroke="#14384d" stroke-width="18"/>
  <path d="M185 416a272 272 0 0 1 530 0M190 560a268 268 0 0 0 520 0" fill="none" stroke="#fff1c8" stroke-width="20" opacity=".65"/>

